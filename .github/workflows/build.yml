name: build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "tdlib/telegram-bot-api git ref to build"
        default: "master"
        required: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: |
          REF="${{ github.event.inputs.ref || 'master' }}"
          docker build --build-arg "TBA_REF=$REF" -t telegram-bot-api:built .
          docker run --rm --entrypoint /usr/local/bin/telegram-bot-api telegram-bot-api:built --version
          docker save telegram-bot-api:built | gzip -1 > telegram-bot-api-image.tar.gz
          ls -lh telegram-bot-api-image.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: telegram-bot-api-image
          path: telegram-bot-api-image.tar.gz
          retention-days: 7
